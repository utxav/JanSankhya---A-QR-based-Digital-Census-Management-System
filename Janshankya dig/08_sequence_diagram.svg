<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" font-family="Arial, sans-serif">
  <rect width="960" height="720" fill="#F8F9FC" rx="12"/>
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#0D1B4B">Sequence Diagram — Census Submission Flow</text>
  <line x1="80" y1="50" x2="880" y2="50" stroke="#E07B00" stroke-width="2"/>

  <!-- Lifeline headers -->
  <rect x="60" y="68" width="120" height="44" rx="8" fill="#1D4ED8" stroke="none"/>
  <text x="120" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Enumerator</text>
  <text x="120" y="102" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">(Android User)</text>

  <rect x="220" y="68" width="120" height="44" rx="8" fill="#0D1B4B" stroke="none"/>
  <text x="280" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Android</text>
  <text x="280" y="102" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">App</text>

  <rect x="400" y="68" width="120" height="44" rx="8" fill="#166534" stroke="none"/>
  <text x="460" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PHP</text>
  <text x="460" y="102" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">REST API</text>

  <rect x="590" y="68" width="120" height="44" rx="8" fill="#0D1B4B" stroke="none"/>
  <text x="650" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="white">MySQL</text>
  <text x="650" y="102" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">Database</text>

  <rect x="770" y="68" width="120" height="44" rx="8" fill="#E07B00" stroke="none"/>
  <text x="830" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Room DB</text>
  <text x="830" y="102" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">(Android Local)</text>

  <!-- Lifelines -->
  <line x1="120" y1="112" x2="120" y2="700" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="280" y1="112" x2="280" y2="700" stroke="#0D1B4B" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="460" y1="112" x2="460" y2="700" stroke="#166534" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="650" y1="112" x2="650" y2="700" stroke="#0D1B4B" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="830" y1="112" x2="830" y2="700" stroke="#E07B00" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- SEQUENCE MESSAGES -->
  <!-- Helper function: message line at y, from x1 to x2 with label -->

  <!-- 1. Login -->
  <rect x="60" y="130" width="30" height="200" fill="rgba(29,78,216,0.15)" rx="2"/>
  <rect x="264" y="130" width="30" height="200" fill="rgba(13,27,75,0.12)" rx="2"/>
  <line x1="90" y1="148" x2="264" y2="148" stroke="#0D1B4B" stroke-width="1.5" marker-end="url(#sq)"/>
  <rect x="130" y="136" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="180" y="148" text-anchor="middle" font-size="9" fill="#374151">enterCredentials()</text>

  <!-- 2. Android → API: POST login -->
  <line x1="294" y1="172" x2="445" y2="172" stroke="#0D1B4B" stroke-width="1.5" marker-end="url(#sq)"/>
  <rect x="320" y="160" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="370" y="172" text-anchor="middle" font-size="9" fill="#374151">POST /auth/login</text>

  <!-- 3. API → MySQL -->
  <line x1="475" y1="190" x2="635" y2="190" stroke="#166534" stroke-width="1.5" marker-end="url(#sqg)"/>
  <rect x="520" y="178" width="70" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="190" text-anchor="middle" font-size="9" fill="#166534">SELECT staff</text>

  <!-- 4. MySQL → API: return user -->
  <line x1="635" y1="208" x2="475" y2="208" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sqg)"/>
  <rect x="520" y="196" width="70" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="208" text-anchor="middle" font-size="9" fill="#166534">user data</text>

  <!-- 5. API → Android: JSON success -->
  <line x1="445" y1="226" x2="294" y2="226" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sq)"/>
  <rect x="320" y="214" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="370" y="226" text-anchor="middle" font-size="9" fill="#374151">{success:true}</text>

  <!-- 6. Android → Enumerator: show home -->
  <line x1="264" y1="244" x2="90" y2="244" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sq)"/>
  <rect x="130" y="232" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="180" y="244" text-anchor="middle" font-size="9" fill="#374151">showDashboard()</text>

  <!-- DIVIDER -->
  <line x1="60" y1="265" x2="900" y2="265" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="480" y="278" text-anchor="middle" font-size="9" fill="#9CA3AF">QR Scan &amp; UID Validation</text>

  <!-- 7. Enumerator scans QR -->
  <rect x="60" y="285" width="30" height="60" fill="rgba(29,78,216,0.15)" rx="2"/>
  <rect x="264" y="285" width="30" height="60" fill="rgba(13,27,75,0.12)" rx="2"/>
  <line x1="90" y1="300" x2="264" y2="300" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#sqb)"/>
  <rect x="130" y="288" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="180" y="300" text-anchor="middle" font-size="9" fill="#1D4ED8">scanQR(uid)</text>

  <!-- 8. GET /citizens/get -->
  <line x1="294" y1="318" x2="445" y2="318" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#sqb)"/>
  <rect x="300" y="306" width="120" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="360" y="318" text-anchor="middle" font-size="9" fill="#1D4ED8">GET /citizens/get?uid=</text>

  <!-- 9. API checks citizens + census_records -->
  <line x1="475" y1="336" x2="635" y2="336" stroke="#166534" stroke-width="1.5" marker-end="url(#sqg)"/>
  <rect x="490" y="324" width="130" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="336" text-anchor="middle" font-size="9" fill="#166534">SELECT citizen + dup check</text>

  <!-- 10. MySQL → API -->
  <line x1="635" y1="354" x2="475" y2="354" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sqg)"/>
  <rect x="510" y="342" width="90" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="354" text-anchor="middle" font-size="9" fill="#166534">found/not found</text>

  <!-- DIVIDER -->
  <line x1="60" y1="375" x2="900" y2="375" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="480" y="388" text-anchor="middle" font-size="9" fill="#9CA3AF">Census Form Submission</text>

  <!-- 11. Fill 7-step form -->
  <rect x="60" y="395" width="30" height="200" fill="rgba(29,78,216,0.15)" rx="2"/>
  <rect x="264" y="395" width="30" height="200" fill="rgba(13,27,75,0.12)" rx="2"/>
  <line x1="90" y1="410" x2="264" y2="410" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#sqb)"/>
  <rect x="120" y="398" width="112" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="176" y="410" text-anchor="middle" font-size="9" fill="#1D4ED8">fill7StepForm(data)</text>

  <!-- 12. GPS capture -->
  <line x1="264" y1="430" x2="264" y2="430" stroke="#E07B00" stroke-width="1.5"/>
  <line x1="294" y1="430" x2="815" y2="430" stroke="#E07B00" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#sqo)"/>
  <rect x="490" y="418" width="115" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="547" y="430" text-anchor="middle" font-size="9" fill="#E07B00">GPS.getLastLocation()</text>

  <line x1="815" y1="448" x2="294" y2="448" stroke="#E07B00" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sqo)"/>
  <rect x="490" y="436" width="115" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="547" y="448" text-anchor="middle" font-size="9" fill="#E07B00">lat, lng coordinates</text>

  <!-- 13. Check connectivity -->
  <rect x="264" y="460" width="30" height="16" fill="rgba(13,27,75,0.12)" rx="2"/>
  <text x="279" y="472" text-anchor="middle" font-size="8" fill="#6B7280">check</text>

  <!-- 14a. Online: POST census -->
  <line x1="294" y1="485" x2="445" y2="485" stroke="#166534" stroke-width="1.5" marker-end="url(#sqg)"/>
  <rect x="305" y="473" width="128" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="369" y="485" text-anchor="middle" font-size="9" fill="#166534">POST /citizens/add (online)</text>

  <!-- 15. API → MySQL INSERT -->
  <line x1="475" y1="503" x2="635" y2="503" stroke="#166534" stroke-width="1.5" marker-end="url(#sqg)"/>
  <rect x="495" y="491" width="120" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="503" text-anchor="middle" font-size="9" fill="#166534">INSERT census_record</text>

  <!-- 16. success response -->
  <line x1="635" y1="521" x2="475" y2="521" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sqg)"/>
  <rect x="510" y="509" width="90" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="555" y="521" text-anchor="middle" font-size="9" fill="#166534">{success:true}</text>

  <line x1="445" y1="539" x2="294" y2="539" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sqg)"/>
  <rect x="320" y="527" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="370" y="539" text-anchor="middle" font-size="9" fill="#166534">Record saved!</text>

  <!-- 14b. Offline: save to Room -->
  <line x1="294" y1="558" x2="815" y2="558" stroke="#E07B00" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#sqo)"/>
  <rect x="490" y="546" width="140" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="560" y="558" text-anchor="middle" font-size="9" fill="#E07B00">insert(record, synced=false) [if offline]</text>

  <!-- 17. navigate home -->
  <line x1="264" y1="580" x2="90" y2="580" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#sq)"/>
  <rect x="130" y="568" width="100" height="16" rx="3" fill="white" stroke="#E5E7EB"/>
  <text x="180" y="580" text-anchor="middle" font-size="9" fill="#374151">navigateHome()</text>

  <!-- Legend -->
  <line x1="80" y1="620" x2="110" y2="620" stroke="#0D1B4B" stroke-width="1.5"/>
  <text x="116" y="624" font-size="9" fill="#374151">Synchronous call</text>
  <line x1="220" y1="620" x2="250" y2="620" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="256" y="624" font-size="9" fill="#374151">Return / async</text>
  <line x1="360" y1="620" x2="390" y2="620" stroke="#E07B00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="396" y="624" font-size="9" fill="#374151">Offline-only path</text>

  <defs>
    <marker id="sq" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0D1B4B"/>
    </marker>
    <marker id="sqb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D4ED8"/>
    </marker>
    <marker id="sqg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#166534"/>
    </marker>
    <marker id="sqo" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E07B00"/>
    </marker>
  </defs>
</svg>
