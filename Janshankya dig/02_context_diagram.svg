<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="Arial, sans-serif">
  <rect width="900" height="560" fill="#F8F9FC" rx="12"/>
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#0D1B4B">Context Diagram — JanSankhya</text>
  <line x1="80" y1="50" x2="820" y2="50" stroke="#E07B00" stroke-width="2"/>

  <!-- Central System -->
  <rect x="310" y="210" width="280" height="120" rx="14" fill="#0D1B4B"/>
  <text x="450" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="white">JanSankhya</text>
  <text x="450" y="278" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.7)">Census Management System</text>
  <text x="450" y="298" text-anchor="middle" font-size="10" fill="#E07B00">Web · Android · PHP API · MySQL</text>
  <text x="450" y="316" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.5)">v1.0 — 2026</text>

  <!-- ACTOR: Administrator (top-left) -->
  <rect x="60" y="80" width="160" height="90" rx="10" fill="white" stroke="#0D1B4B" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D1B4B">Administrator</text>
  <text x="140" y="126" text-anchor="middle" font-size="10" fill="#6B7280">Admin Staff</text>
  <text x="140" y="144" text-anchor="middle" font-size="10" fill="#6B7280">Full system access</text>
  <text x="140" y="160" text-anchor="middle" font-size="9" fill="#E07B00">Web Portal</text>

  <!-- ACTOR: Supervisor (top-right) -->
  <rect x="680" y="80" width="160" height="90" rx="10" fill="white" stroke="#0D1B4B" stroke-width="2"/>
  <text x="760" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D1B4B">Supervisor</text>
  <text x="760" y="126" text-anchor="middle" font-size="10" fill="#6B7280">Zone Manager</text>
  <text x="760" y="144" text-anchor="middle" font-size="10" fill="#6B7280">District-level access</text>
  <text x="760" y="160" text-anchor="middle" font-size="9" fill="#E07B00">Web Portal</text>

  <!-- ACTOR: Enumerator (bottom-left) -->
  <rect x="60" y="380" width="160" height="90" rx="10" fill="white" stroke="#1D4ED8" stroke-width="2"/>
  <text x="140" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#1D4ED8">Enumerator</text>
  <text x="140" y="426" text-anchor="middle" font-size="10" fill="#6B7280">Field Worker</text>
  <text x="140" y="444" text-anchor="middle" font-size="10" fill="#6B7280">Data Collector</text>
  <text x="140" y="460" text-anchor="middle" font-size="9" fill="#1D4ED8">Android App</text>

  <!-- ACTOR: Citizen (bottom-right) -->
  <rect x="680" y="380" width="160" height="90" rx="10" fill="white" stroke="#166534" stroke-width="2"/>
  <text x="760" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Citizen</text>
  <text x="760" y="426" text-anchor="middle" font-size="10" fill="#6B7280">Registered Person</text>
  <text x="760" y="444" text-anchor="middle" font-size="10" fill="#6B7280">UID Card Holder</text>
  <text x="760" y="460" text-anchor="middle" font-size="9" fill="#166534">QR Code Identity</text>

  <!-- Arrows: Admin → System -->
  <line x1="220" y1="125" x2="310" y2="245" stroke="#0D1B4B" stroke-width="1.5" marker-end="url(#arr1)"/>
  <rect x="218" y="170" width="70" height="15" rx="3" fill="#EFF6FF"/>
  <text x="253" y="181" text-anchor="middle" font-size="8" fill="#0D1B4B">Login / Manage</text>

  <!-- System → Admin -->
  <line x1="310" y1="230" x2="220" y2="140" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr1)"/>
  <rect x="237" y="195" width="68" height="15" rx="3" fill="#FFF7ED"/>
  <text x="271" y="206" text-anchor="middle" font-size="8" fill="#E07B00">Reports / Data</text>

  <!-- Supervisor → System -->
  <line x1="680" y1="125" x2="590" y2="245" stroke="#0D1B4B" stroke-width="1.5" marker-end="url(#arr1)"/>
  <rect x="608" y="170" width="68" height="15" rx="3" fill="#EFF6FF"/>
  <text x="642" y="181" text-anchor="middle" font-size="8" fill="#0D1B4B">Assign / Review</text>

  <!-- System → Supervisor -->
  <line x1="590" y1="230" x2="680" y2="140" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr1)"/>
  <rect x="610" y="195" width="68" height="15" rx="3" fill="#FFF7ED"/>
  <text x="644" y="206" text-anchor="middle" font-size="8" fill="#E07B00">Stats / Progress</text>

  <!-- Enumerator → System -->
  <line x1="220" y1="395" x2="310" y2="295" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="218" y="345" width="72" height="15" rx="3" fill="#EFF6FF"/>
  <text x="254" y="356" text-anchor="middle" font-size="8" fill="#1D4ED8">Census Data</text>

  <!-- System → Enumerator -->
  <line x1="310" y1="310" x2="220" y2="410" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <rect x="230" y="370" width="72" height="15" rx="3" fill="#EFF6FF"/>
  <text x="266" y="381" text-anchor="middle" font-size="8" fill="#1D4ED8">Citizen Profile</text>

  <!-- Citizen → System (QR code used by enumerator) -->
  <line x1="680" y1="395" x2="590" y2="295" stroke="#166534" stroke-width="1.5" marker-end="url(#arr3)"/>
  <rect x="608" y="340" width="68" height="15" rx="3" fill="#F0FDF4"/>
  <text x="642" y="351" text-anchor="middle" font-size="8" fill="#166534">UID / QR Scan</text>

  <!-- System → Citizen -->
  <line x1="590" y1="310" x2="680" y2="410" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr3)"/>
  <rect x="608" y="374" width="68" height="15" rx="3" fill="#F0FDF4"/>
  <text x="642" y="385" text-anchor="middle" font-size="8" fill="#166534">UID Card / QR</text>

  <!-- Legend -->
  <line x1="100" y1="520" x2="130" y2="520" stroke="#374151" stroke-width="1.5"/>
  <text x="136" y="524" font-size="10" fill="#374151">Input to system</text>
  <line x1="240" y1="520" x2="270" y2="520" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="276" y="524" font-size="10" fill="#374151">Output from system</text>

  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0D1B4B"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D4ED8"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#166534"/>
    </marker>
  </defs>
</svg>
