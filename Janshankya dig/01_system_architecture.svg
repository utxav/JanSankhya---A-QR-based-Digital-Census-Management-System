<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="580" fill="#F8F9FC" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="18" font-weight="bold" fill="#0D1B4B">JanSankhya — System Architecture Diagram</text>
  <line x1="80" y1="52" x2="820" y2="52" stroke="#E07B00" stroke-width="2"/>

  <!-- LAYER LABELS -->
  <text x="30" y="130" font-size="10" fill="#9CA3AF" font-weight="600" transform="rotate(-90,30,130)">PRESENTATION</text>
  <text x="30" y="280" font-size="10" fill="#9CA3AF" font-weight="600" transform="rotate(-90,30,280)">APPLICATION</text>
  <text x="30" y="420" font-size="10" fill="#9CA3AF" font-weight="600" transform="rotate(-90,30,420)">DATA</text>

  <!-- PRESENTATION TIER -->
  <!-- React Web App -->
  <rect x="100" y="80" width="200" height="110" rx="10" fill="#FFFFFF" stroke="#0D1B4B" stroke-width="2"/>
  <rect x="100" y="80" width="200" height="32" rx="10" fill="#0D1B4B"/>
  <rect x="100" y="100" width="200" height="12" rx="0" fill="#0D1B4B"/>
  <text x="200" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">React Web Application</text>
  <text x="200" y="128" text-anchor="middle" font-size="10" fill="#6B7280">Admin · Supervisor</text>
  <text x="200" y="146" text-anchor="middle" font-size="10" fill="#6B7280">React 18 + Vite + Tailwind</text>
  <text x="200" y="162" text-anchor="middle" font-size="10" fill="#E07B00">Citizens · Census · Reports</text>
  <text x="200" y="178" text-anchor="middle" font-size="10" fill="#E07B00">UID Cards · Dashboard</text>

  <!-- Android App -->
  <rect x="600" y="80" width="200" height="110" rx="10" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="2"/>
  <rect x="600" y="80" width="200" height="32" rx="10" fill="#1D4ED8"/>
  <rect x="600" y="100" width="200" height="12" rx="0" fill="#1D4ED8"/>
  <text x="700" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Android Application</text>
  <text x="700" y="128" text-anchor="middle" font-size="10" fill="#6B7280">Enumerator · Field Use</text>
  <text x="700" y="146" text-anchor="middle" font-size="10" fill="#6B7280">Java · Android API 24+</text>
  <text x="700" y="162" text-anchor="middle" font-size="10" fill="#1D4ED8">QR Scan · 7-Step Form</text>
  <text x="700" y="178" text-anchor="middle" font-size="10" fill="#1D4ED8">GPS · Offline Sync</text>

  <!-- APPLICATION TIER -->
  <rect x="280" y="250" width="340" height="110" rx="10" fill="#FFFFFF" stroke="#166534" stroke-width="2"/>
  <rect x="280" y="250" width="340" height="32" rx="10" fill="#166534"/>
  <rect x="280" y="270" width="340" height="12" rx="0" fill="#166534"/>
  <text x="450" y="271" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PHP REST API (Application Layer)</text>
  <text x="450" y="298" text-anchor="middle" font-size="10" fill="#6B7280">Apache HTTP Server · XAMPP · PHP 8.2 · PDO</text>
  <text x="450" y="316" text-anchor="middle" font-size="10" fill="#166534">12+ RESTful Endpoints · JSON Responses · CORS Headers</text>
  <text x="320" y="334" font-size="10" fill="#374151">auth/ · citizens/ · census/ · enumerators/ · staff/ · stats/</text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#166534">Business Logic · Validation · Duplicate Detection</text>

  <!-- DATA TIER -->
  <!-- MySQL -->
  <rect x="150" y="430" width="240" height="100" rx="10" fill="#FFFFFF" stroke="#0D1B4B" stroke-width="2"/>
  <rect x="150" y="430" width="240" height="32" rx="10" fill="#0D1B4B"/>
  <rect x="150" y="450" width="240" height="12" rx="0" fill="#0D1B4B"/>
  <text x="270" y="451" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MySQL Database</text>
  <text x="270" y="478" text-anchor="middle" font-size="10" fill="#6B7280">MySQL 8.0 Community</text>
  <text x="270" y="496" text-anchor="middle" font-size="10" fill="#E07B00">citizens · enumerators</text>
  <text x="270" y="512" text-anchor="middle" font-size="10" fill="#E07B00">staff · census_records</text>
  <text x="270" y="522" text-anchor="middle" font-size="9" fill="#9CA3AF">jansankhya schema</text>

  <!-- Room DB -->
  <rect x="510" y="430" width="240" height="100" rx="10" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="510" y="430" width="240" height="32" rx="10" fill="#1D4ED8"/>
  <rect x="510" y="450" width="240" height="12" rx="0" fill="#1D4ED8"/>
  <text x="630" y="451" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Room Database (Local)</text>
  <text x="630" y="478" text-anchor="middle" font-size="10" fill="#6B7280">Android SQLite · Offline Storage</text>
  <text x="630" y="496" text-anchor="middle" font-size="10" fill="#1D4ED8">CensusRecord Entity</text>
  <text x="630" y="512" text-anchor="middle" font-size="10" fill="#1D4ED8">synced=false → auto-sync</text>
  <text x="630" y="528" text-anchor="middle" font-size="9" fill="#9CA3AF">Write-ahead buffer</text>

  <!-- ARROWS: Web → API -->
  <line x1="200" y1="190" x2="200" y2="235" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="200" y1="235" x2="350" y2="252" stroke="#0D1B4B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-navy)"/>

  <!-- ARROWS: Android → API -->
  <line x1="700" y1="190" x2="700" y2="235" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="700" y1="235" x2="560" y2="252" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- ARROWS: API → MySQL -->
  <line x1="380" y1="360" x2="310" y2="430" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ARROWS: Android → Room -->
  <line x1="700" y1="190" x2="700" y2="430" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="2,4" marker-end="url(#arrow-blue)"/>

  <!-- ARROWS: Room → API (sync) -->
  <path d="M630 430 Q630 390 560 360" fill="none" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- HTTP Labels -->
  <rect x="210" y="215" width="90" height="18" rx="4" fill="#F0FDF4"/>
  <text x="255" y="228" text-anchor="middle" font-size="9" fill="#166534" font-weight="600">HTTP / REST</text>
  
  <rect x="580" y="215" width="90" height="18" rx="4" fill="#EFF6FF"/>
  <text x="625" y="228" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="600">HTTP / REST</text>

  <rect x="294" y="395" width="70" height="18" rx="4" fill="#F0FDF4"/>
  <text x="329" y="408" text-anchor="middle" font-size="9" fill="#166534" font-weight="600">PDO / SQL</text>

  <rect x="640" y="330" width="90" height="18" rx="4" fill="#EFF6FF"/>
  <text x="685" y="343" text-anchor="middle" font-size="9" fill="#1D4ED8" font-weight="600">Offline Buffer</text>

  <!-- Legend -->
  <rect x="100" y="550" width="14" height="14" rx="2" fill="#0D1B4B"/>
  <text x="120" y="561" font-size="10" fill="#374151">Web / Admin Layer</text>
  <rect x="240" y="550" width="14" height="14" rx="2" fill="#1D4ED8"/>
  <text x="260" y="561" font-size="10" fill="#374151">Android / Mobile Layer</text>
  <rect x="420" y="550" width="14" height="14" rx="2" fill="#166534"/>
  <text x="440" y="561" font-size="10" fill="#374151">API / Backend Layer</text>
  <line x1="580" y1="557" x2="604" y2="557" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="610" y="561" font-size="10" fill="#374151">Offline / Async</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow-navy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0D1B4B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1D4ED8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#166534"/>
    </marker>
  </defs>
</svg>
